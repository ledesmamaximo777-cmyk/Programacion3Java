server:
  port: 8081

spring:
  application:
    name: smart-inventory

# Documentación OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

# Configuración de inventario
inventario:
  stock:
    minimo: 10
    critico: 3

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.inventory.smart: INFO
